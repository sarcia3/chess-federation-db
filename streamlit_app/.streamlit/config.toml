# Catppuccin theme.
#   Light slot = Latte,  Dark slot = Mocha,  accent = Mauve.
# Switch between them in the app: ⋮ menu -> Settings -> "Choose app theme".

[client]
# "viewer"  = hide Deploy + developer options, but KEEP the ⋮ menu's Settings
#             dialog (so users can still switch the app theme).
# "minimal" = hide the whole menu too (no Settings → no theme switcher).
toolbarMode = "viewer"

[theme]
font = "Atkinson Hyperlegible Next, sans-serif"

# Register the Atkinson Hyperlegible Next webfont (served from Google Fonts).
[[theme.fontFaces]]
family = "Atkinson Hyperlegible Next"
url = "https://fonts.gstatic.com/s/atkinsonhyperlegiblenext/v7/NaP4cYPdHfdVxJw0IfIP0lvYFqijb-UxCtm5_wdGscKFt4tOOfV4ZmW37LQhtA.ttf"
weight = 400

[[theme.fontFaces]]
family = "Atkinson Hyperlegible Next"
url = "https://fonts.gstatic.com/s/atkinsonhyperlegiblenext/v7/NaP4cYPdHfdVxJw0IfIP0lvYFqijb-UxCtm5_wdGscKFt4tOOfV4ZmW3C7MhtA.ttf"
weight = 700

# ---------------------------------------------------------------------------
# Catppuccin Latte  (selected as the "Light" theme)
# ---------------------------------------------------------------------------
[theme.light]
primaryColor = "#8839ef"               # Mauve  (accent)
backgroundColor = "#eff1f5"            # Base
secondaryBackgroundColor = "#e6e9ef"   # Mantle  (widgets / sidebar)
textColor = "#4c4f69"                  # Text
linkColor = "#1e66f5"                  # Blue
borderColor = "#bcc0cc"                # Surface1
codeBackgroundColor = "#e6e9ef"        # Mantle
dataframeHeaderBackgroundColor = "#e6e9ef"  # Mantle
dataframeBorderColor = "#bcc0cc"       # Surface1
# semantic colors (alerts, st.metric deltas, etc.)
redColor = "#d20f39"
orangeColor = "#fe640b"                # Peach
yellowColor = "#df8e1d"
greenColor = "#40a02b"
blueColor = "#1e66f5"
violetColor = "#7287fd"                # Lavender
grayColor = "#7c7f93"                  # Overlay1

# ---------------------------------------------------------------------------
# Catppuccin Mocha  (selected as the "Dark" theme)
# ---------------------------------------------------------------------------
[theme.dark]
primaryColor = "#cba6f7"               # Mauve  (accent)
backgroundColor = "#1e1e2e"            # Base
secondaryBackgroundColor = "#313244"   # Surface0
textColor = "#cdd6f4"                  # Text
linkColor = "#89b4fa"                  # Blue
borderColor = "#45475a"                # Surface1
codeBackgroundColor = "#181825"        # Mantle
dataframeHeaderBackgroundColor = "#181825"  # Mantle
dataframeBorderColor = "#45475a"       # Surface1
redColor = "#f38ba8"
orangeColor = "#fab387"                # Peach
yellowColor = "#f9e2af"
greenColor = "#a6e3a1"
blueColor = "#89b4fa"
violetColor = "#b4befe"                # Lavender
grayColor = "#7f849c"                  # Overlay1
